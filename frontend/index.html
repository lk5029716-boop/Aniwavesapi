<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aniwaves API - Interactive Documentation</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0d1117;color:#c9d1d9;min-height:100vh}
.container{max-width:900px;margin:0 auto;padding:24px}
h1{color:#58a6ff;font-size:28px;margin-bottom:8px}
.subtitle{color:#8b949e;margin-bottom:32px}
.endpoint{border:1px solid #30363d;border-radius:6px;margin-bottom:8px;overflow:hidden}
.endpoint-header{display:flex;align-items:center;padding:12px 16px;background:#161b22;cursor:pointer;user-select:none}
.endpoint-header:hover{background:#1c2128}
.method{padding:2px 8px;border-radius:4px;font-size:12px;font-weight:700;margin-right:12px;min-width:60px;text-align:center}
.get{background:#3fb950;color:#fff}
.path{font-family:monospace;font-size:14px;color:#c9d1d9}
.arrow{margin-left:auto;color:#8b949e;transition:transform 0.2s}
.arrow.open{transform:rotate(90deg)}
.endpoint-body{padding:16px;background:#0d1117;border-top:1px solid #30363d;display:none}
.endpoint-body.open{display:block}
.params-table{width:100%;border-collapse:collapse;margin-bottom:16px}
.params-table th{text-align:left;padding:8px;background:#161b22;color:#8b949e;font-size:12px;border:1px solid #30363d}
.params-table td{padding:8px;border:1px solid #30363d;font-family:monospace;font-size:13px}
.param-name{color:#58a6ff}
.param-type{color:#a371f7;font-size:11px}
.param-required{color:#f85149;font-size:11px}
.param-optional{color:#8b949e;font-size:11px}
.test-btn{background:#238636;color:#fff;border:1px solid #2ea043;padding:8px 16px;border-radius:6px;cursor:pointer;font-size:14px;margin-right:8px}
.test-btn:hover{background:#2ea043}
.test-btn:disabled{background:#30363d;color:#6e7681;cursor:not-allowed}
.response-box{background:#161b22;border:1px solid #30363d;border-radius:6px;padding:16px;margin-top:16px;font-family:monospace;font-size:12px;white-space:pre-wrap;word-break:break-all;max-height:400px;overflow:auto;color:#c9d1d9}
.response-box.error{color:#f85149}
.input-field{background:#0d1117;border:1px solid #30363d;border-radius:6px;padding:6px 10px;color:#c9d1d9;font-family:monospace;font-size:13px;width:200px;margin-right:8px}
.input-field:focus{outline:none;border-color:#58a6ff}
.status-badge{display:inline-block;padding:2px 8px;border-radius:12px;font-size:12px;font-weight:600}
.status-ok{background:#238636;color:#fff}
.status-err{background:#da3633;color:#fff}
.loading{color:#d29922}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState } = React;

const API_BASE = 'https://aniwavesapi.onrender.com';

const endpoints = [
  {
    method: 'GET',
    path: '/api/health',
    title: 'Health Check',
    description: 'Check if the API server is running.',
    params: [],
  },
  {
    method: 'GET',
    path: '/api/search',
    title: 'Search & Filter Anime',
    description: 'Search anime by keyword.',
    params: [
      { name: 'q', type: 'string', required: true, description: 'Search query (e.g. naruto)' },
    ],
  },
  {
    method: 'GET',
    path: '/api/details',
    title: 'Anime Details',
    description: 'Get full details for an anime.',
    params: [
      { name: 'id', type: 'string', required: true, description: 'Anime ID (e.g. naruto-76396)' },
    ],
  },
  {
    method: 'GET',
    path: '/api/episodes',
    title: 'Anime Episodes',
    description: 'Get episode list for an anime.',
    params: [
      { name: 'id', type: 'string', required: true, description: 'Anime ID (e.g. naruto-76396)' },
    ],
  },
  {
    method: 'GET',
    path: '/api/servers',
    title: 'Episode Servers List',
    description: 'Get available servers for a specific episode.',
    params: [
      { name: 'id', type: 'string', required: true, description: 'Anime ID' },
      { name: 'ep', type: 'number', required: true, description: 'Episode number' },
      { name: 'type', type: 'string', required: false, description: 'sub, dub, or raw (default: sub)' },
    ],
  },
  {
    method: 'GET',
    path: '/api/stream',
    title: 'Episode Video Stream',
    description: 'Get the video stream URL for an episode. If no server is specified, tries all servers in order.',
    params: [
      { name: 'id', type: 'string', required: true, description: 'Anime ID' },
      { name: 'ep', type: 'number', required: true, description: 'Episode number' },
      { name: 'type', type: 'string', required: false, description: 'sub, dub, or raw (default: sub)' },
      { name: 'server', type: 'string', required: false, description: 'Specific server name (e.g. vidplay, byfms, dghg)' },
    ],
  },
];

function Endpoint({ endpoint }) {
  const [open, setOpen] = useState(false);
  const [values, setValues] = useState({});
  const [response, setResponse] = useState(null);
  const [loading, setLoading] = useState(false);
  const [status, setStatus] = useState(null);

  const handleTest = async () => {
    setLoading(true);
    setResponse(null);
    setStatus(null);

    const params = new URLSearchParams();
    for (const p of endpoint.params) {
      const val = values[p.name];
      if (val) params.set(p.name, val);
    }

    const url = `${API_BASE}${endpoint.path}?${params}`;
    try {
      const res = await fetch(url);
      setStatus(res.status);
      const text = await res.text();
      try {
        setResponse(JSON.stringify(JSON.parse(text), null, 2));
      } catch {
        setResponse(text);
      }
    } catch (err) {
      setResponse('Error: ' + err.message);
      setStatus(0);
    }
    setLoading(false);
  };

  return (
    <div className="endpoint">
      <div className="endpoint-header" onClick={() => setOpen(!open)}>
        <span className={`method ${endpoint.method.toLowerCase()}`}>{endpoint.method}</span>
        <span className="path">{endpoint.path}</span>
        <span style={{ marginLeft: 12, color: '#8b949e', fontSize: 13 }}>{endpoint.title}</span>
        <span className={`arrow ${open ? 'open' : ''}`}>▶</span>
      </div>
      {open && (
        <div className="endpoint-body">
          <p style={{ marginBottom: 16, color: '#8b949e' }}>{endpoint.description}</p>

          {endpoint.params.length > 0 && (
            <table className="params-table">
              <thead>
                <tr>
                  <th>Parameter</th>
                  <th>Type</th>
                  <th>Required</th>
                  <th>Description</th>
                  <th>Value</th>
                </tr>
              </thead>
              <tbody>
                {endpoint.params.map(p => (
                  <tr key={p.name}>
                    <td className="param-name">{p.name}</td>
                    <td className="param-type">{p.type}</td>
                    <td>
                      <span className={p.required ? 'param-required' : 'param-optional'}>
                        {p.required ? 'required' : 'optional'}
                      </span>
                    </td>
                    <td>{p.description}</td>
                    <td>
                      <input
                        className="input-field"
                        placeholder={p.name}
                        value={values[p.name] || ''}
                        onChange={e => setValues({ ...values, [p.name]: e.target.value })}
                      />
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          )}

          <button className="test-btn" onClick={handleTest} disabled={loading}>
            {loading ? '⏳ Loading...' : '▶ Test Endpoint'}
          </button>

          {status !== null && (
            <span className={`status-badge ${status >= 200 && status < 300 ? 'status-ok' : 'status-err'}`}>
              {status >= 200 && status < 300 ? '✓' : '✗'} {status}
            </span>
          )}

          {response && (
            <div className={`response-box ${status >= 200 && status < 300 ? '' : 'error'}`}>
              {response}
            </div>
          )}
        </div>
      )}
    </div>
  );
}

function APIDocs() {
  return (
    <div className="container">
      <h1>🎬 Aniwaves API</h1>
      <p className="subtitle">Interactive Documentation — Click an endpoint to expand, fill in parameters, and test it live.</p>

      <div style={{ marginBottom: 24, padding: 16, background: '#161b22', borderRadius: 6, border: '1px solid #30363d' }}>
        <strong style={{ color: '#58a6ff' }}>Base URL:</strong>
        <code style={{ marginLeft: 8, color: '#c9d1d9' }}>{API_BASE}</code>
      </div>

      <h2 style={{ color: '#c9d1d9', fontSize: 18, marginBottom: 16 }}>Available Endpoints</h2>

      {endpoints.map(ep => (
        <Endpoint key={ep.path} endpoint={ep} />
      ))}

      <div style={{ marginTop: 48, padding: '16px 0', borderTop: '1px solid #30363d', color: '#6e7681', fontSize: 13 }}>
        Aniwaves API — Built with Node.js + Express — Deployed on Render
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<APIDocs />);
</script>
</body>
</html>
