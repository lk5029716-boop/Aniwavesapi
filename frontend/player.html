<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Player</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;color:#fff;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;min-height:100vh}
#player-wrap{position:relative;width:100%;height:100vh;display:flex;align-items:center;justify-content:center}
video{width:100%;height:100%;display:block}
#overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.92);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:10}
#overlay.hidden{display:none}
.box{background:#111;border:1px solid #222;border-radius:12px;padding:32px;text-align:center;max-width:460px;width:90%}
.icon{font-size:48px;margin-bottom:16px}
.msg{font-size:18px;font-weight:500;margin-bottom:8px}
.sub{font-size:13px;color:#666;line-height:1.6}
.err{color:#ff4444;font-size:13px;margin-top:12px;line-height:1.6}
.btn{background:#00d4ff;color:#000;border:none;padding:10px 28px;border-radius:6px;cursor:pointer;font-size:14px;font-weight:600;margin-top:16px}
.btn:hover{background:#00b8e6}
.btn.orange{background:#ff8800}
.btn.orange:hover{background:#ff7700}
.server-tag{display:inline-block;padding:2px 10px;border-radius:4px;font-size:11px;font-weight:600;margin-left:8px}
.server-tag.vidplay{background:#00d4ff22;color:#00d4ff}
.server-tag.dghg{background:#ff880022;color:#ffaa00}
#top-bar{position:fixed;top:0;left:0;width:100%;background:rgba(0,0,0,.7);padding:10px 20px;font-size:13px;display:flex;justify-content:space-between;align-items:center;z-index:5}
#top-bar.hidden{display:none}
</style>
</head>
<body>

<div id="top-bar" class="hidden">
  <span id="top-info"></span>
  <span id="top-server"></span>
</div>

<div id="player-wrap">
  <div id="overlay">
    <div class="box">
      <div class="icon" id="ovIcon">⏳</div>
      <div class="msg" id="ovMsg">Loading...</div>
      <div class="sub" id="ovSub"></div>
      <div class="err" id="ovErr"></div>
      <button class="btn" id="ovBtn" style="display:none"></button>
    </div>
  </div>
  <video id="video" controls playsinline style="display:none"></video>
</div>

<script>
(function(){
  const API = 'https://aniwavesapis.onrender.com';
  const WORKER = 'https://dghg-proxy.lk5029716.workers.dev';
  const params = new URLSearchParams(location.search);
  const animeId = params.get('id');
  const ep = params.get('ep') || '1';
  const type = params.get('type') || 'sub';
  const forceServer = params.get('server') || '';

  if(!animeId){
    setUI('❌','Missing parameters','Usage: ?id=animeId&ep=1&type=sub&server=vidplay');
    return;
  }

  let hls = null;
  let pollInterval = null;

  function setUI(icon,msg,sub,err){
    document.getElementById('ovIcon').textContent=icon;
    document.getElementById('ovMsg').textContent=msg;
    document.getElementById('ovSub').textContent=sub||'';
    document.getElementById('ovErr').textContent=err||';
    document.getElementById('overlay').classList.remove('hidden');
    document.getElementById('video').style.display='none';
    document.getElementById('top-bar').classList.add('hidden');
  }

  function showVideo(){
    document.getElementById('overlay').classList.add('hidden');
    document.getElementById('video').style.display='block';
    document.getElementById('top-bar').classList.remove('hidden');
  }

  function cleanup(){
    if(hls){hls.destroy();hls=null;}
    if(pollInterval)clearInterval(pollInterval);
  }

  function playM3u8(url, serverName){
    const video = document.getElementById('video');
    showVideo();
    const tagClass = serverName==='dghg' ? 'dghg' : 'vidplay';
    document.getElementById('top-info').textContent = `${animeId} — Ep ${ep}`;
    document.getElementById('top-server').innerHTML = `<span class="server-tag ${tagClass}">${serverName}</span>`;

    if(Hls.isSupported()){
      hls = new Hls({enableWorker:true,lowLatencyMode:true});
      hls.loadSource(url);
      hls.attachMedia(video);
      hls.on(Hls.Events.MANIFEST_PARSED,()=>video.play().catch(()=>{}));
      hls.on(Hls.Events.ERROR,(e,d)=>{
        if(d.fatal){
          cleanup();
          setUI('❌','Playback error','The stream failed to load.','Type: '+d.type,'Retry',()=>location.reload());
        }
      });
    } else if(video.canPlayType('application/vnd.apple.mpegurl')){
      video.src = url;
      video.addEventListener('loadedmetadata',()=>video.play().catch(()=>{}));
    } else {
      setUI('❌','Browser not supported','Your browser cannot play HLS streams');
    }
  }

  async function fetchStream(){
    setUI('⏳','Loading stream...','Fetching from '+(forceServer||'auto')+' server');
    try{
      const p = new URLSearchParams({id:animeId,ep:type});
      if(forceServer)p.set('server',forceServer);
      const resp = await fetch(`${API}/api/stream?${p}`);
      const data = await resp.json();

      if(data.m3u8){
        playM3u8(data.m3u8, data._server||'Unknown');
      } else if(data.type==='dghg_proxy'){
        solveDghg(data);
      } else if(data.error){
        setUI('❌','Stream failed',data.error,'','Retry',()=>fetchStream());
      }
    }catch(e){
      setUI('❌','Request failed',e.message,'','Retry',()=>fetchStream());
    }
  }

  function solveDghg(data){
    const videoId = data.video_id;
    const host = data.host;
    const proxyUrl = data.proxy_url;
    const resultUrl = `${WORKER}/__dghg_result?id=${encodeURIComponent(videoId)}`;

    setUI('🔐','DGHG Turnstile','Solving Cloudflare challenge...');

    const w=520,h=580;
    const popup = window.open(proxyUrl,'dghg_popup',`width=${w},height=${h},left=${(screen.width-w)/2},top=${(screen.height-h)/2}`);

    if(!popup){
      setUI('🔐','Popup blocked','Click below to open Turnstile page','',
        'Open Turnstile',()=>{
          window.open(proxyUrl,'dghg_popup',`width=${w},height=${h}`);
          startPoll();
        });
      return;
    }
    startPoll();

    let polls=0;
    pollInterval = setInterval(async()=>{
      polls++;
      if(polls>180){
        clearInterval(pollInterval);
        setUI('⏰','Timed out','Turnstile not solved in time','','Retry',()=>fetchStream());
        return;
      }
      try{
        const r = await fetch(resultUrl);
        const d = await r.json();
        if(d.status==='done'){
          clearInterval(pollInterval);
          setUI('📡','Getting CDN URL...','Almost there...');
          try{
            const token = d.passMd5Url.split('/').pop();
            const cdnR = await fetch(`${API}/api/dghg/passmd5?url=${encodeURIComponent(d.passMd5Url)}&referer=https://${host}/e/${videoId}`);
            const cdnD = await cdnR.json();
            if(cdnD.cdn_url){
              const chars='ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
              let s='';
              for(let i=0;i<10;i++) s+=chars.charAt(Math.floor(Math.random()*chars.length));
              playM3u8(cdnD.cdn_url+s+'?token='+token+'&expiry='+Date.now(),'dghg');
            } else {
              setUI('❌','CDN failed','Could not get video URL','','Retry',()=>fetchStream());
            }
          }catch(e){
            setUI('❌','CDN error',e.message,'','Retry',()=>fetchStream());
          }
        }
      }catch(e){}
    },1000);
  }

  fetchStream();
})();
</script>
</body>
</html>
