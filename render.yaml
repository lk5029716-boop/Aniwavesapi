{
  "version": 2,
  "services": [
    {
      "type": "web",
      "name": "aniwavesapis",
      "env": "node",
      "buildCommand": "pip3 install curl_cffi beautifulsoup4 && npm install && npx playwright install --with-deps chromium && npm run build",
      "startCommand": "node dist/index.mjs",
      "envVars": [
        { "key": "ANIWAVES_SCRAPER_PATH", "value": "/opt/render/project/src/aniwaves_scraper.py" },
        { "key": "ANIWAVES_PROXY_URL", "value": "" }
      ]
    }
  ]
}
